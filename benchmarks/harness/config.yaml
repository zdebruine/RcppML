# Benchmark harness configuration
# All timing uses fixed iterations (tol=1e-10) to ensure maxit runs.
# 5 replicates per config for variance estimation.

defaults:
  replicates: 5
  tol: 1.0e-10
  seed: 42
  omp_threads: 4

datasets:
  sparse_large:
    rows: 5000
    cols: 2000
    density: 0.1
    file: "datasets/sparse_5k_2k.rds"
  dense_medium:
    rows: 1000
    cols: 500
    file: "datasets/dense_1k_500.rds"

suites:
  nmf_cpu_baseline:
    file: "suites/nmf_cpu_baseline.R"
    backend: cpu
    inputs: [sparse_large, dense_medium]
    ranks: [8, 16, 32, 64]
    maxit: 20
    timeout_sec: 120

  nmf_gpu_baseline:
    file: "suites/nmf_gpu_baseline.R"
    backend: gpu
    inputs: [sparse_large, dense_medium]
    ranks: [8, 16, 32, 64]
    maxit: 20
    timeout_sec: 120

  nmf_distributions:
    file: "suites/nmf_distributions.R"
    backend: [cpu, gpu]
    inputs: [sparse_large]
    distributions: [gp, nb, gamma]
    ranks: [16]
    maxit: 10
    timeout_sec: 120

  nmf_cv:
    file: "suites/nmf_cv.R"
    backend: [cpu, gpu]
    inputs: [sparse_large]
    ranks: [16]
    maxit: 20
    timeout_sec: 120

  nmf_streaming:
    file: "suites/nmf_streaming.R"
    backend: [cpu, gpu]
    inputs: [sparse_large, dense_medium]
    ranks: [16]
    maxit: 20
    timeout_sec: 120

  svd_methods:
    file: "suites/svd_methods.R"
    backend: cpu
    inputs: [sparse_large, dense_medium]
    methods: [deflation, krylov, lanczos, irlba, randomized]
    ranks: [5, 10, 20]
    timeout_sec: 120

  nnls_crossover:
    file: "suites/nnls_crossover.R"
    backend: cpu
    inputs: [sparse_large]
    ranks: [4, 8, 16, 24, 32, 48, 64]
    solvers: [cd, cholesky]
    maxit: 20
    timeout_sec: 120
