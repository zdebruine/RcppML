        status: implemented
        validation_level: none
        notes: >
          Semi-NMF: W is unconstrained (negative values allowed).
          Uses LS solve for W, NNLS for H. Already wired: nmf(A, k, nonneg=c(FALSE,TRUE))
          passes nonneg_w=FALSE through to C++ NNLS solver which respects the flag.
          Audited March 2026: user-reachable and functional. Needs dedicated tests.
        action: "Write dedicated semi-NMF tests verifying W contains negative values"

      - id: semi_nmf.cpu.dense
        status: implemented
        validation_level: none
        notes: >
          Dense semi-NMF works via same path as sparse. nmf(dense_matrix, k, nonneg=c(FALSE,TRUE)).
          Audited March 2026: user-reachable and functional.
        action: "Write dense semi-NMF test"

      - id: semi_nmf.gpu.sparse
        status: implemented
        validation_level: none
        notes: >
          GPU semi-NMF: nonneg_w=FALSE passes through to GPU NNLS solver.
          GPU dispatch handles it via the same gateway as standard NMF.
          Audited March 2026: user-reachable via resource="gpu", nonneg=c(FALSE,TRUE).
        action: "Write GPU semi-NMF parity test"

      - id: semi_nmf.gpu.dense
