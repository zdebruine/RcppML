        notes: "GPU NNLS available but not exposed as standalone R function."
        action: "Expose via R bridge. Write parity test."

      - id: nnls.gpu.dense
        status: planned
        notes: "GPU NNLS with dense RHS (cuBLAS GEMM)."
        action: "Implement GPU dense NNLS and expose via R bridge"

      - id: nnls.streaming_cpu.sparse
        status: planned
