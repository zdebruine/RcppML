    description: >
      Distribution × zero-inflation mode × backend. Only GP and NB support ZI.
      ZI-twoway is BROKEN — fix attempt required; remove if unfixable.
      Target: all ZI modes on both CPU and GPU, sparse and dense.
    entries:

      # --- GP × ZI ---
      - id: gp.zi_none.cpu
