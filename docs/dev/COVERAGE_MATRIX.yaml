  # ===========================================================================
  # GROUP 9: Streaming Architecture (SPZ DataLoader)
  # ===========================================================================
  - id: streaming_architecture
    description: >
      SPZ file format and DataLoader abstraction. SPZ stores compressed column
      panels. The loader decompresses into Eigen::SparseMatrix<Scalar>.
      Dense streaming requires SPZ v3 dense format: store dense column panels,
      decompress into Eigen::MatrixXf. NOT a separate DataLoader class — same
      SpzLoader with a format flag controlling decompression target.
    entries:

      - id: spz.loader.sparse
        status: tested
        validation_level: parity
        r_test:
          - "test_spz_io.R::SPZ write/read roundtrip"
          - "test_streaming.R::streaming matches in-memory"
        cpp_path:
          - io/spz_loader.hpp
          - io/loader.hpp
          - io/in_memory.hpp
        notes: >
          DataLoader<Scalar> abstract base. SpzLoader reads .spz files,
          emits Chunk<Scalar> (SparseMatrix). InMemoryLoader wraps dgCMatrix.

      - id: spz.loader.dense
        status: planned
        notes: >
          SPZ v3 dense format. Same SpzLoader class extended with format flag.
          When format=dense, decompress panels into MatrixXf instead of
          SparseMatrix. Chunk<Scalar> needs variant type or separate DenseChunk.
        action: "Design SPZ v3 dense format; implement SpzLoader extension"

      - id: spz.write.sparse
        status: tested
        validation_level: parity
        r_test:
          - "test_spz_io.R::SPZ write matches original"
        cpp_path: io/spz_write.hpp

      - id: spz.write.dense
        status: planned
        notes: "Write dense matrix as SPZ v3 dense format."
        action: "Implement SPZ v3 dense write"

      - id: spz.auto_chunking.cpu
        status: implemented
        validation_level: none
        cpp_path: nmf/fit_streaming_spz.hpp
        notes: "Auto-splits input into chunks based on available RAM."
        action: "Write auto-chunk correctness test"

      - id: spz.auto_chunking.gpu
        status: implemented
        validation_level: none
        cpp_path: nmf/fit_gpu_streaming.cuh
        notes: "VRAM-based auto-chunking."
        action: "Write GPU auto-chunk correctness test"

