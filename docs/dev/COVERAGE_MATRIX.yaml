        r_test:
          - "test_nnls.R::recovered H correlates > 0.9 with true H"
          - "test_nnls.R::reconstruction error < 0.1"
          - "test_nnls.R::sparse/dense equivalence corr > 0.99"
          - "test_solve.R::NNLS solve interface"
