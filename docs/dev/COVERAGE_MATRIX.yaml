        notes: "Dense→sparse conversion at runtime for GPU CV. Works but suboptimal."
        action: "Write GPU dense CV test; implement native dense GPU CV path"

      - id: mse.cv_full.gpu.dense
        status: implemented
        validation_level: none
        cpp_path: nmf/fit_cv_gpu.cuh
        notes: "Same dense→sparse conversion."
        action: "Write test; implement native dense path"

      # --- GP × CV ---
      - id: gp.cv_speckled.cpu.sparse
        status: tested
        validation_level: smoke
        r_test:
          - "test_cv_irls.R::GP CV runs"
        cpp_path: nmf/fit_cv.hpp

      - id: gp.cv_full.cpu.sparse
