        action: "Write GP dense CV full test"

      - id: gp.cv_speckled.gpu.sparse
        status: implemented
        validation_level: none
        cpp_path: gpu/cv_kernels.cuh
        notes: "Host-mediated IRLS for non-MSE CV on GPU."
        action: "Write GPU GP CV parity test"

      - id: gp.cv_full.gpu.sparse
        status: planned
        action: "Implement GPU IRLS CV full-mask path"

      - id: gp.cv.gpu.dense
        status: planned
