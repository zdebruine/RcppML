      - id: nnls.streaming_cpu.dense
        status: planned
        notes: "Streaming NNLS with dense SPZ v3 chunks."
        action: "Implement after SPZ v3 dense format"

      - id: nnls.streaming_gpu.sparse
        status: planned
        notes: "GPU streaming NNLS."
        action: "Implement after CPU streaming NNLS"

      - id: nnls.streaming_gpu.dense
        status: planned
        notes: "GPU streaming NNLS with dense chunks."
        action: "Implement after SPZ v3 + GPU streaming NNLS"

      # --- LS (unconstrained least squares / Semi-NMF solve) ---
      - id: ls.cpu.sparse
        status: implemented
        validation_level: none
        notes: >
          Unconstrained least squares: solve min||WH - A|| without non-negativity.
          Already available via nnls(w=W, A=A, nonneg=c(TRUE,FALSE)). The CD solver
          respects nonneg=FALSE and skips the non-negativity clipping step.
          Audited March 2026: user-reachable and functional.
        action: "Write dedicated LS test verifying solution matches base::solve"

      - id: ls.cpu.dense
        status: implemented
        validation_level: none
        notes: >
          Dense unconstrained LS via nnls(nonneg=FALSE) with dense input.
          Audited March 2026: user-reachable and functional.
        action: "Write dense LS test"

      - id: ls.gpu.sparse
        status: planned
        notes: "GPU unconstrained LS."
        action: "Implement GPU LS solver"

      - id: ls.gpu.dense
        status: planned
        notes: "GPU dense LS."
        action: "Implement via cuSOLVER or cuBLAS"

      - id: ls.streaming_cpu.sparse
        status: planned
        notes: "Streaming LS for out-of-core Semi-NMF."
        action: "Implement after standalone LS"

      - id: ls.streaming_cpu.dense
        status: planned
