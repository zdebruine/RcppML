  # ===========================================================================
  # GROUP 4: Cross-Validation × Distribution × Backend × Input Type
  # ===========================================================================
  - id: cross_validation
    description: >
      CV is an orthogonal axis: every NMF configuration (distribution × backend
      × input type × variant) should support CV. CV introduces a holdout mask
      (speckled or full) that modifies per-column Gram and RHS.
      GPU CV currently falls back to CPU for projective/symmetric/Cholesky.
      Target: native GPU CV for all configurations.
    entries:

      # --- MSE × CV ---
      - id: mse.cv_speckled.cpu.sparse
        status: tested
        validation_level: smoke
        r_test:
          - "test_multi_rank_cv.R::CV returns nmfCrossValidate object"
          - "test_multi_rank_cv.R::test_mse > 0 and reproducible"
          - "test_masking.R::speckled mask is deterministic"
        cpp_path:
          - nmf/fit_cv.hpp
          - nmf/speckled_cv.hpp
        notes: "LazySpeckledMask O(1) hash. Per-column Gram correction."

      - id: mse.cv_full.cpu.sparse
        status: tested
        validation_level: smoke
        r_test:
          - "test_nmf.R::CV full mask runs"
        cpp_path: nmf/fit_cv.hpp

      - id: mse.cv_speckled.cpu.dense
        status: implemented
        validation_level: none
        cpp_path: nmf/fit_cv.hpp
        notes: "Dense CV on CPU works — same template, dense MatrixType."
        action: "Write dense CV test"

      - id: mse.cv_full.cpu.dense
        status: implemented
        validation_level: none
        cpp_path: nmf/fit_cv.hpp
        action: "Write dense CV full test"

      - id: mse.cv_speckled.gpu.sparse
        status: implemented
        validation_level: none
        cpp_path:
          - nmf/fit_cv_gpu.cuh
          - gpu/fused_cv.cuh
        notes: "GPU fused delta+NNLS kernel. SplitMix64 matches CPU mask."
        action: "Write GPU CV vs CPU CV parity test"

      - id: mse.cv_full.gpu.sparse
