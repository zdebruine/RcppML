        status: implemented
        validation_level: none
        cpp_path: primitives/cpu/cholesky_nnls.hpp
        action: "Write Cholesky dense test"

      - id: solver.cholesky.mse.gpu.sparse
        status: planned
        notes: "GPU Cholesky NNLS. Currently falls back to CD on GPU."
        action: "Implement GPU Cholesky NNLS"

      - id: solver.cholesky.irls.cpu
        status: unsupported
        guard_exists: neither
        notes: "Cholesky + IRLS not meaningful — IRLS updates weights per iteration."
        action: "Add guard"

