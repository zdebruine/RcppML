  # ===========================================================================
  # GROUP 5: NNLS Solver Configuration
  # ===========================================================================
  - id: nnls_solver_config
    description: >
      NNLS solver modes: coordinate descent (CD, default), Cholesky.
      CD supports both MSE (bare) and IRLS. Cholesky supports MSE only.
      Target: CD and Cholesky on CPU and GPU for both sparse and dense.
    entries:

      - id: solver.cd.mse.cpu.sparse
        status: tested
        validation_level: property
        r_test:
          - "test_nmf.R::CD NNLS converges"
          - "test_nnls.R::CD NNLS ground truth"
        cpp_path: primitives/cpu/nnls_batch.hpp
        notes: "Default solver. Active-set CD with tolerance."

      - id: solver.cd.mse.cpu.dense
        status: tested
        validation_level: property
        r_test:
          - "test_nnls.R::dense NNLS parity"
        cpp_path: primitives/cpu/nnls_batch.hpp

      - id: solver.cd.mse.gpu.sparse
        status: tested
        validation_level: parity
        r_test:
          - "test_gpu_accuracy.R::GPU CD NNLS ≈ CPU"
        cpp_path: gpu/batch_nnls.cuh

      - id: solver.cd.mse.gpu.dense
        status: implemented
        validation_level: none
        cpp_path: gpu/batch_nnls.cuh
        action: "Write GPU dense CD NNLS test"

      - id: solver.cd.irls.cpu.sparse
        status: tested
        validation_level: smoke
        r_test:
          - "test_gp_nmf.R::GP IRLS converges"
          - "test_nb_nmf.R::NB IRLS converges"
        cpp_path: primitives/cpu/nnls_batch_irls.hpp

      - id: solver.cd.irls.cpu.dense
        status: tested
        validation_level: smoke
        r_test:
          - "test_dense_irls.R::dense IRLS converges"
        cpp_path: primitives/cpu/nnls_batch_irls.hpp

      - id: solver.cd.irls.gpu.sparse
        status: implemented
        validation_level: none
        cpp_path: primitives/gpu/nnls_batch_irls.cuh
        notes: "Fused GPU IRLS kernel. All distributions."
        action: "Write GPU IRLS parity test per distribution"

      - id: solver.cd.irls.gpu.dense
        status: planned
        notes: "GPU dense IRLS. Major dependency for many GPU dense entries."
        action: "Implement GPU dense IRLS kernel"

      - id: solver.cholesky.mse.cpu.sparse
        status: tested
        validation_level: parity
        r_test:
