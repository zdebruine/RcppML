# =============================================================================
# COVERAGE_MATRIX.yaml — FactorNet / RcppML Functional Coverage Matrix
# =============================================================================
# Revision 5 — March 2026 (Audited)
#
# AUDIT SUMMARY (March 2026):
# ============================
# All 123 "planned" entries were audited for user-reachability.
# Findings:
#   - 6 entries promoted to "implemented" (semi_nmf.cpu.*, ls.cpu.*, semi_nmf.gpu.*)
#     These were already functional via nonneg=c(FALSE,TRUE) in nmf() and nnls().
#   - ~117 entries remain "planned" — blocked on unimplemented infrastructure:
#     * SPZ v3 dense format (~25 entries) — no dense .spz files exist yet
#     * GPU dense IRLS (~15 entries) — C++ gateway falls back to CPU safely
#     * Streaming GPU dense variants — blocked on SPZ v3
#     * Streaming LS/semi-NMF/guided variants — blocked on base streaming support
#     * Infrastructure (CI GPU, C++ unit tests) — tooling only, not user-reachable
#   - NO user-reachable paths silently produce wrong results
#   - GPU + dense + non-MSE: safely falls back to CPU via gateway try/catch
#   - Standalone GPU NNLS: nnls() has no GPU dispatch; no misleading docs
#
# AGENT CONTEXT PROMPT
# =====================
# This file is the single source of truth for what is supported, tested,
# broken, planned, or guarded across the FactorNet C++ library and RcppML R
# package. It scopes all downstream hardening work (Phases 2–11 of
# HARDENING_PLAN.md).
#
# FactorNet is a header-only C++ template library for matrix factorization
# (NMF, SVD, NNLS, clustering) at inst/include/FactorNet/. RcppML is the R
# package wrapper that exposes it via Rcpp.
#
# The library supports four backends:
#   CPU           — In-memory, OpenMP-parallel
#   GPU           — CUDA (cuBLAS, cuSPARSE, custom kernels)
#   Streaming-CPU — Out-of-core via SPZ chunked I/O → CPU compute
#   Streaming-GPU — Out-of-core via SPZ chunked I/O → GPU compute
#
# Two input types per backend: sparse (dgCMatrix / CSC) and dense.
# MPI / Multi-GPU support has been REMOVED (March 2026).
#
# Orthogonal axes that apply to every algorithm:
#   Backend:    CPU, GPU, Streaming-CPU, Streaming-GPU
#   Input type: sparse, dense
#   CV mode:    none, speckled, full-mask
#   Every CPU feature is a parity target for GPU.
#   Every sparse path is a parity target for dense.
#   Every in-memory path is a parity target for streaming.
#
# Eight IRLS-based distributions:
#   MSE (Gaussian), GP (Generalized Poisson), NB (Negative Binomial),
#   Gamma, Inverse Gaussian, Tweedie, + Robust variants (Huber modifier).
#
# Four algorithm families:
#   NMF  — Non-negative matrix factorization (W·d·H)
#   SVD  — Truncated SVD (5 methods: deflation, krylov, lanczos, irlba, randomized)
#   NNLS — Standalone non-negative least squares (given W, solve for H)
#   LS   — Unconstrained least squares (Semi-NMF solve, no non-negativity)
#
# Streaming data format:
#   All streaming paths use the SPZ file format via the DataLoader abstraction
#   (io/loader.hpp → io/spz_loader.hpp). SPZ internally stores compressed
#   column panels that can be decompressed into Eigen::SparseMatrix or
#   Eigen::MatrixXf. Dense streaming requires SPZ v3 dense format (planned).
#
# Design goal: FULL PARITY across all axes. Every algorithm on CPU should
# also work on GPU, with both sparse and dense inputs, plus streaming variants.
# Entries marked "planned" represent the target state.
#
# When implementing a "planned" entry:
#   1. Write the C++ implementation in the appropriate path
#   2. Wire it through the dispatch layer (fit.hpp gateway or R bridge)
#   3. Write at least one R-level test (smoke + parity)
#   4. Update this entry: status → implemented/tested, add r_test, cpp_path
#   5. Run devtools::document() then bash tools/fix_rcpp_info_bug.sh
#
# =============================================================================
# CONVENTIONS
# =============================================================================
#
# cpp_path:  Relative to inst/include/FactorNet/
# src_path:  Relative to src/ (Rcpp bridge files)
# r_test:    tests/testthat/ file(s). Format: "file.R::block description"
# cpp_test:  C++ unit tests — currently null for all entries.
#
# status values:
#   validated     — Tested with ground-truth or mathematical property verification
#   tested        — Has R-level tests (smoke, property, or regression)
#   implemented   — Code exists, no tests
#   planned       — Not yet implemented; in scope for development
#   broken        — Known incorrect behavior
#   unsupported   — Theoretically invalid or intentionally excluded
#   deprecated    — Code exists but marked for removal
#   removed       — Code deleted; entry kept for historical reference
#   fallback      — Code exists but falls back to another backend (e.g. GPU→CPU)
#
# validation_level:
#   ground_truth, property, parity, regression, smoke, none
#
# guard_exists: "r", "cpp", "both", "neither" — for unsupported entries
#
# =============================================================================

groups:

  # ===========================================================================
  # GROUP 1: Core Algorithm × Backend × Input Type
  # ===========================================================================
  - id: core_algorithm_backend
    description: >
      Core algorithm × backend × input type. The fundamental dispatch matrix.
      Target: every algorithm on every backend with both sparse and dense input.
    # WQ1 Audit Notes (March 2026):
# - semi_nmf.cpu.sparse/dense: nonneg_w=FALSE passes through to C++ NNLS solver
#   which already supports unconstrained LS. Status updated to implemented.
# - LS (unconstrained): nnls(nonneg=FALSE) already works. Status updated.
# - GPU dense + non-MSE losses: Falls back to CPU via C++ gateway. Safe, no guard needed.
# - Dense streaming (SPZ v3): Not user-reachable until v3 format is written.
# - ~95% of planned entries are internal/future infrastructure, not user-reachable.

entries:

      # --- NMF ---
      - id: nmf.cpu.sparse
        status: tested
        validation_level: property
        r_test:
          - "test_nmf.R::loss improves with more iterations"
          - "test_convergence.R::loss strictly decreases (warm-start regression)"
          - "test_ground_truth_recovery.R::recovers known W/H factors"
          - "test_unified_backend.R::sparse path produces valid result"
        cpp_test: null
        cpp_path: nmf/fit_cpu.hpp
        notes: "Primary path. All features supported."
        action: "Write C++ ground-truth test with per-factor cosine > 0.95"

      - id: nmf.cpu.dense
        status: tested
        validation_level: property
        r_test:
          - "test_nmf.R::dense input converges"
          - "test_unified_backend.R::dense path matches sparse for same data"
          - "test_masking.R::dense zero handling"
        cpp_test: null
        cpp_path: nmf/fit_cpu.hpp
        notes: "Dense input auto-detected in gateway. Same fit_cpu.hpp code."
        action: "Write C++ sparse-vs-dense parity test"

      - id: nmf.gpu.sparse
        status: tested
        validation_level: parity
        r_test:
          - "test_gpu_accuracy.R::GPU NMF loss ≈ CPU NMF loss"
          - "test_g1_g6_fixes.R::G1 GPU accuracy regression"
        cpp_test: null
        cpp_path: nmf/fit_gpu.cuh
        notes: "Full GPU path with cuSPARSE SpMM, cuBLAS Gram."
        action: "Write C++ GPU-vs-CPU parity test with tight tolerance"

      - id: nmf.gpu.dense
        status: tested
        validation_level: smoke
        r_test:
          - "test_gpu_dense.R::GPU dense NMF runs"
        cpp_test: null
        cpp_path: nmf/fit_gpu_dense.cuh
        notes: "GPU dense path. ~600 lines."
        action: "Write C++ GPU dense ground-truth test"

      - id: nmf.streaming_cpu.sparse
        status: tested
        validation_level: parity
        r_test:
          - "test_streaming.R::streaming matches in-memory"
          - "test_file_input.R::SPZ file input"
        cpp_test: null
        cpp_path:
          - nmf/fit_streaming_spz.hpp
          - nmf/fit_chunked.hpp
        notes: >
          SPZ file streaming. fit_streaming_spz.hpp is MSE-only auto-chunk.
          fit_chunked.hpp supports all losses via weight_zeros=true in IRLS.
        action: "Write C++ streaming-vs-inmemory parity test"

      - id: nmf.streaming_cpu.dense
        status: planned
        notes: >
          Dense streaming via SPZ v3 dense format. DataLoader decompresses
          chunks into Eigen::MatrixXf. Same chunked algorithm as sparse but
          with dense RHS/Gram primitives.
        action: "Implement SPZ v3 dense format + wire through fit_chunked.hpp"

      - id: nmf.streaming_gpu.sparse
        status: tested
        validation_level: smoke
        r_test:
          - "test_gpu_streaming.R::GPU streaming NMF runs"
          - "test_chunked_gpu.R::GPU chunked runs"
        cpp_test: null
        cpp_path:
          - nmf/fit_gpu_streaming.cuh
          - nmf/fit_chunked_gpu.cuh
        notes: "Auto VRAM chunking. Both MSE-only and all-loss paths."
        action: "Write C++ GPU streaming-vs-inmemory parity test"

      - id: nmf.streaming_gpu.dense
        status: planned
        notes: "Dense streaming to GPU via SPZ v3 dense chunks."
        action: "Implement after SPZ v3 dense format"

      # --- SVD ---
      - id: svd.cpu.sparse
        status: tested
        validation_level: property
        r_test:
          - "test_svd.R::SVD reconstruction error < threshold"
          - "test_svd.R::prcomp comparison on iris"
          - "test_project_svd.R::SVD projection"
        cpp_test: null
        cpp_path: svd/gateway.hpp
        notes: "All 5 methods. Auto-select heuristic in auto_select.hpp."
        action: "Write per-method C++ test vs base::svd"

      - id: svd.cpu.dense
